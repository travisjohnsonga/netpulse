// gNMI extension definitions.
// https://github.com/openconfig/gnmi/blob/master/proto/gnmi_ext/gnmi_ext.proto

syntax = "proto3";

package gnmi_ext;

option go_package = "github.com/openconfig/gnmi/proto/gnmi_ext";

// Extension carries optional gNMI extensions in request/response messages.
message Extension {
  oneof ext {
    RegisteredExtension registered_ext = 1;
    History             history        = 3;
  }
}

message RegisteredExtension {
  ExtensionID id  = 1;
  bytes       msg = 2;
}

enum ExtensionID {
  EID_UNSET        = 0;
  EID_EXPERIMENTAL = 999;
}

message History {
  oneof request {
    int64     snapshot_time = 1;
    TimeRange range         = 2;
  }
}

message TimeRange {
  int64 start = 1;
  int64 end   = 2;
}
