# HTTP (port 80) — redirects to HTTPS, but keeps proxying so the app still
# works if TLS isn't fronted by something else. Adjust to a hard redirect in
# production by uncommenting the `return 301` line below.
server {
    listen 80;

    # Use Docker's embedded DNS so upstreams resolve at request time, not at
    # startup. Without this, nginx aborts on boot if `api`/`websocket` aren't up
    # yet — taking the whole SPA down. With it, only the proxied route fails while
    # the static app keeps serving.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # return 301 https://$host$request_uri;  # uncomment to force HTTPS

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        set $api_upstream http://api:8000;
        proxy_pass $api_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /ws/ {
        set $ws_upstream http://websocket:8001;
        proxy_pass $ws_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}

# HTTPS (port 443) — serves NetPulse's own server certificate. The cert/key
# live on the shared ssl-certs volume; the API writes them and an entrypoint
# bootstraps a temporary self-signed pair so nginx always starts.
server {
    listen 443 ssl;
    http2 on;

    resolver 127.0.0.11 valid=10s ipv6=off;

    ssl_certificate     /etc/nginx/ssl/netpulse.crt;
    ssl_certificate_key /etc/nginx/ssl/netpulse.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        set $api_upstream http://api:8000;
        proxy_pass $api_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /ws/ {
        set $ws_upstream http://websocket:8001;
        proxy_pass $ws_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }
}
