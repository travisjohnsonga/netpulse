# HTTP listener — hard-redirects every request to HTTPS on the standard port
# (443). Correct when the frontend is served on the standard HTTPS port
# (FRONTEND_HTTPS_PORT=443). On a non-standard host port (e.g. dev's 3443) the
# redirect won't carry the port; template FRONTEND_HTTPS_PORT into the redirect
# via envsubst if you need to support that.
server {
    listen 80 default_server;
    return 301 https://$host$request_uri;
}

# HTTPS (port 443) — serves NetPulse's own server certificate. The cert/key
# live on the shared ssl-certs volume; the API writes them and an entrypoint
# bootstraps a temporary self-signed pair so nginx always starts.
server {
    listen 443 ssl;
    http2 on;

    resolver 127.0.0.11 valid=10s ipv6=off;

    ssl_certificate     /etc/nginx/ssl/netpulse.crt;
    ssl_certificate_key /etc/nginx/ssl/netpulse.key;
    # Admin-managed trust bundle (system roots + Trusted CA Certificates), used
    # for OCSP stapling. Seeded by the entrypoint so it always exists.
    ssl_trusted_certificate /etc/nginx/ssl/ca-bundle.crt;
    # TLS 1.3 only (Security Rule #7: "TLS 1.3 min for external"). Browsers and
    # the Go agent's mTLS transport all negotiate 1.3.
    ssl_protocols       TLSv1.3;
    ssl_prefer_server_ciphers off;

    # NetPulse Agent mTLS: request (but don't require) a client cert at the TLS
    # handshake, verified against the agent CA. TLS 1.3 forbids per-location
    # renegotiation, so the cert is requested here at the server level and
    # ENFORCED per-location below (agent ingest paths 403 without a valid cert).
    # Browsers/API clients send no cert → $ssl_client_verify = NONE, ignored.
    # The CA file is published by the api (setup_agent_pki) onto the shared ssl
    # volume; the entrypoint seeds a placeholder so nginx always starts.
    ssl_client_certificate /etc/nginx/ssl/agent-ca.crt;
    ssl_verify_client optional;
    ssl_verify_depth 2;

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        # Security headers for the statically-served SPA. (Django's middleware
        # already sets these on /api/ proxied responses; nginx covers the static
        # assets it serves directly, which would otherwise get none.)
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }

    # Agent install script + binary downloads — public endpoints served by the
    # api (download_views) from AGENT_DIR. Must be proxied, not handled by the
    # SPA fallback above (prefix match takes priority over `location /` regardless
    # of order). No client cert required — these run before a host is enrolled.
    location /agent/ {
        set $agent_dl_upstream http://api:8000;
        proxy_pass $agent_dl_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        # Strip any client-supplied agent-auth headers so they can't be spoofed
        # to the api upstream (matches the /api/ block).
        proxy_set_header X-Agent-Verified "";
        proxy_set_header X-Agent-Cert-Serial "";
        proxy_set_header X-Agent-Cert-Subject "";
        # Stream binary downloads instead of buffering the whole file.
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Agent metric + role-check ingestion — require a CA-verified client cert and
    # forward its serial so Django authenticates the agent (AgentCertAuthentication).
    # nginx sets these headers from the verified TLS session, overwriting any
    # client-supplied values.
    location ~ ^/api/agents/[^/]+/(metrics|role-checks)/$ {
        if ($ssl_client_verify != SUCCESS) { return 403; }
        set $agent_upstream http://api:8000;
        proxy_pass $agent_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Agent-Verified    $ssl_client_verify;
        proxy_set_header X-Agent-Cert-Serial $ssl_client_serial;
        proxy_set_header X-Agent-Cert-Subject $ssl_client_s_dn;
    }

    location /api/ {
        set $api_upstream http://api:8000;
        proxy_pass $api_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Forward the real client IP so DRF (NUM_PROXIES=1) keys the auth
        # throttle per client instead of on the shared nginx IP.
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        # Strip any client-supplied agent-auth headers on non-mTLS paths so they
        # can't be spoofed to the api upstream.
        proxy_set_header X-Agent-Verified "";
        proxy_set_header X-Agent-Cert-Serial "";
        proxy_set_header X-Agent-Cert-Subject "";
    }

    # social-auth OAuth flow (begin/complete/disconnect) lives on the Django
    # backend under /auth/ — must be proxied, not served by the SPA, or the SSO
    # login buttons would just reload the app.
    location /auth/ {
        set $auth_upstream http://api:8000;
        proxy_pass $auth_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /ws/ {
        set $ws_upstream http://websocket:8001;
        proxy_pass $ws_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }
}
