server {
    listen 80;

    # Use Docker's embedded DNS so upstreams resolve at request time, not at
    # startup. Without this, nginx aborts on boot if `api`/`websocket` aren't up
    # yet — taking the whole SPA down. With it, only the proxied route fails while
    # the static app keeps serving.
    resolver 127.0.0.11 valid=10s ipv6=off;

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        set $api_upstream http://api:8000;
        proxy_pass $api_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /ws/ {
        set $ws_upstream http://websocket:8001;
        proxy_pass $ws_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
