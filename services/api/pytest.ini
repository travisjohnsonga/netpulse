[pytest]
# Pin the documented in-memory-SQLite test settings via --ds, which has higher
# precedence in pytest-django than the DJANGO_SETTINGS_MODULE env var. The api
# container exports DJANGO_SETTINGS_MODULE=config.settings.development (Postgres),
# under which the threaded compliance run-all tests flake with "connection
# closed"; --ds here makes bare `pytest` (no flags) always run under SQLite.
# The DJANGO_SETTINGS_MODULE line is kept as documentation / fallback; the
# conftest.pytest_configure guard fails fast if anything still selects a
# non-test settings module (e.g. an explicit `pytest --ds=config.settings.development`).
addopts = --ds=config.settings.test
DJANGO_SETTINGS_MODULE = config.settings.test
pythonpath = .
markers =
    requires_devices: test needs real network device I/O; skipped unless NETPULSE_DEVICE_TESTS=1
