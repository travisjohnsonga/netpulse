# Rotation-harness collector-hub. The operator JWT is a FILE (deploy artifact);
# rewriting it + SIGHUP is how a signing-key rotation takes effect. Account
# add/revoke stays resolver-only (no reload) — see resolver_rot.conf.
operator: "/state/operator.jwt"
include "resolver_rot.conf"
server_name: colhub
listen: 0.0.0.0:4222
http:   0.0.0.0:8222
ping_interval: "2s"
ping_max: 2
jetstream { domain: colhub, store_dir: "/data/js" }
leafnodes {
  listen: 0.0.0.0:7422
  advertise: "interproxy:7422"
  no_advertise: true
}
