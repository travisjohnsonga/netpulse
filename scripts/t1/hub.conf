# T1a HUB — operator/JWT mode (the collector-facing trust root). In the real
# deployment this is a DEDICATED operator-mode "collector-hub" so the internal
# central NATS keeps its untouched 4222 user/pass (operator mode is server-wide
# and mutually exclusive with `authorization{user/password}` — see the report).
#
# Identity layers on one leaf connection:
#   - BUS identity   = the collector's operator-signed account creds (here)
#   - TRANSPORT id   = the collector's mTLS client cert (tls{} below)
include "resolver.conf"          # operator + system_account + nats-based resolver

server_name: hub
listen: 0.0.0.0:4222
http:   0.0.0.0:8222

# T0 finding #3 — dead-leaf detection is a documented tunable (failover vs flap;
# ties into edge buffer sizing). Aggressive here for the test.
ping_interval: "2s"
ping_max: 2

jetstream { domain: hub, store_dir: "/data/js" }

leafnodes {
  listen: 0.0.0.0:7422
  # T0 finding #1 — REQUIRED, not style: advertise a fixed ingress + suppress
  # self-advertise, or collectors bypass the ingress on reconnect.
  advertise: "leafproxy:7422"
  no_advertise: true
  tls {
    cert_file: "/certs/hub-cert.pem"
    key_file:  "/certs/hub-key.pem"
    ca_file:   "/certs/ca.pem"
    verify: true              # mTLS — refuse leaves without a trusted client cert
    min_version: "1.3"
    handshake_first: true     # T0 — TLS before any plaintext INFO
    timeout: 5
  }
}
