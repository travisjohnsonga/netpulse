# T1a EDGE2 — collector 2's local NATS. Single OUTBOUND leaf to the hub,
# presenting COLL2.creds (bus identity = its own account) + an mTLS cert
# (transport identity). Local bus is simple/trusted; only the uplink is authed.
server_name: edge2
listen: 0.0.0.0:4222
http:   0.0.0.0:8222
ping_interval: "2s"
ping_max: 2
jetstream { domain: edge2, store_dir: "/data/js" }
leafnodes {
  remotes: [
    {
      url: "tls://leafproxy:7422"
      credentials: "/creds/COLL2.creds"
      tls {
        cert_file: "/certs/edge-cert.pem"
        key_file:  "/certs/edge-key.pem"
        ca_file:   "/certs/ca.pem"
        min_version: "1.3"
        handshake_first: true
      }
    }
  ]
}
