# T2 COLLECTOR-HUB — operator/JWT mode (T1-proven). Holds per-collector accounts
# + the AGG aggregate account whose JetStream buffers telemetry. Ingress +
# advertise/no_advertise + isolation live HERE, never on the internal node.
include "resolver.conf"
server_name: colhub
listen: 0.0.0.0:4222
http:   0.0.0.0:8222
ping_interval: "2s"
ping_max: 2
jetstream { domain: colhub, store_dir: "/data/js" }
leafnodes {
  listen: 0.0.0.0:7422
  advertise: "interproxy:7422"   # T0 #1 — fixed ingress; don't leak the real addr
  no_advertise: true
  # (mTLS is proven in T1; this inter-NATS hop is left plain to ISOLATE the T2
  #  concern — account-mapping + JS buffer/replay — from the transport layer.)
}
