# T2 INTERNAL NATS — the existing central bus, UNTOUCHED 4222 user/pass. It never
# learns collectors exist: it just dials the collector-hub as ONE leaf bound to
# the AGG account, and its TELEMETRY stream sources the hub's buffer. stream-
# processor consumes `netpulse.telemetry.>` exactly as today.
server_name: internal
listen: 0.0.0.0:4222
http:   0.0.0.0:8222
ping_interval: "2s"
ping_max: 2
authorization { user: npuser, password: nppass }   # UNTOUCHED internal auth
jetstream { domain: internal, store_dir: "/data/js" }
leafnodes {
  remotes: [
    {
      url: "nats://interproxy:7422"     # dial the collector-hub via the cuttable proxy
      credentials: "/creds/AGG.creds"   # bind this leaf to the AGG account on the hub
    }
  ]
}
