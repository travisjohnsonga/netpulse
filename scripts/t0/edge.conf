# T0 EDGE node (the on-prem collector's local NATS):
#   - local client listener on 4222 (where edge ingest would publish) — open for
#     the test; in production the edge would secure its local bus too.
#   - JetStream with domain "edge" (the local durable buffer).
#   - a single OUTBOUND leaf connection to the hub over TLS 1.3 + mTLS. No inbound
#     ports are required at the edge. It dials `leafproxy` (the cuttable stand-in
#     for the hub's leaf listener); TLS is end-to-end edge↔hub.
server_name: edge
listen: 0.0.0.0:4222
http: 0.0.0.0:8222

ping_interval: "2s"
ping_max: 2

jetstream {
  domain: edge
  store_dir: "/data/js"
}

leafnodes {
  remotes: [
    {
      url: "tls://leafproxy:7422"
      tls {
        cert_file: "/certs/edge-cert.pem"
        key_file:  "/certs/edge-key.pem"
        ca_file:   "/certs/ca.pem"
        min_version: "1.3"
        handshake_first: true
      }
    }
  ]
}
