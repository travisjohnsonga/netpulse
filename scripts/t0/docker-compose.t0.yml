# Isolated T0 substrate harness — DOES NOT touch the live NetPulse stack or its
# nats. Two throwaway NATS nodes (hub + edge) joined by a leaf connection through
# a cuttable socat proxy (stop/start leafproxy = cut/restore the leaf).
name: netpulse-t0

networks:
  t0net: {}

volumes:
  hubdata: {}
  edgedata: {}

services:
  hub:
    image: nats:2.10-alpine
    command: ["-c", "/etc/nats/hub.conf"]
    volumes:
      - ./hub.conf:/etc/nats/hub.conf:ro
      - ./certs:/certs:ro
      - hubdata:/data
    networks: [t0net]

  # Cuttable stand-in for the hub's leaf listener: plain TCP passthrough (TLS is
  # end-to-end edge↔hub). `docker compose stop leafproxy` crisply cuts the leaf.
  leafproxy:
    image: alpine/socat
    command: ["TCP-LISTEN:7422,fork,reuseaddr", "TCP:hub:7422"]
    ports:
      - "17422:7422"        # exposed to host for the openssl TLS-1.3/mTLS probe
    networks: [t0net]
    depends_on: [hub]

  edge:
    image: nats:2.10-alpine
    command: ["-c", "/etc/nats/edge.conf"]
    volumes:
      - ./edge.conf:/etc/nats/edge.conf:ro
      - ./certs:/certs:ro
      - edgedata:/data
    networks: [t0net]
    depends_on: [leafproxy]

  driver:
    image: natsio/nats-box:latest
    command: ["sleep", "infinity"]
    volumes:
      - ./:/work:ro
    networks: [t0net]
    depends_on: [edge]
