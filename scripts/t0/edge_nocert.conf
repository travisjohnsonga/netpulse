# Negative test: an edge that presents NO client certificate. The hub leaf
# listener has verify:true, so this leaf MUST be refused — proving mTLS is
# required (not merely available). Run transiently by run.sh.
server_name: edge-nocert
listen: 0.0.0.0:4222
http: 0.0.0.0:8222

jetstream {
  domain: edgebad
  store_dir: "/data/js"
}

leafnodes {
  remotes: [
    {
      url: "tls://leafproxy:7422"
      tls {
        ca_file: "/certs/ca.pem"
        min_version: "1.3"
        handshake_first: true
        # No cert_file / key_file → cannot satisfy the hub's verify:true.
      }
    }
  ]
}
