# T0 HUB node — mirrors the intended central NATS:
#   - internal in-cluster client listener on 4222 (user/pass) — PRESERVED, the
#     pattern we keep untouched on the real central server.
#   - JetStream with domain "hub".
#   - a DEDICATED leaf-node listener on 7422 with TLS 1.3 + mTLS (verify client
#     cert against our CA). The internal 4222 listener is separate and unchanged.
server_name: hub
listen: 0.0.0.0:4222
http: 0.0.0.0:8222

# Detect a dead/half-open leaf quickly (≈4-6s) instead of the default tens of
# seconds — so a cut link is recognised promptly. (Aggressive for T0; the real
# central node would use larger values.)
ping_interval: "2s"
ping_max: 2

jetstream {
  domain: hub
  store_dir: "/data/js"
}

# Existing internal auth (the 4222 user/pass we keep on the real central node).
authorization {
  user: npuser
  password: nppass
}

leafnodes {
  listen: 0.0.0.0:7422
  # Tell leaves to (re)connect via the cuttable proxy, not the hub's own address
  # — otherwise NATS advertises 172.x:7422 and the edge bypasses the proxy on
  # reconnect (which would make the leaf un-cuttable in this harness). In the
  # real deployment the collector dials a fixed ingress, so the same applies.
  advertise: "leafproxy:7422"
  no_advertise: true
  tls {
    cert_file: "/certs/hub-cert.pem"
    key_file:  "/certs/hub-key.pem"
    ca_file:   "/certs/ca.pem"
    verify: true            # require + verify the leaf's client cert → mTLS
    timeout: 5
    min_version: "1.3"      # TLS 1.3 minimum
    handshake_first: true   # TLS before any plaintext INFO (no pre-TLS leak)
  }
}
