# Pre-commit hooks for spane/NetPulse.
#   Install:  pip install pre-commit && pre-commit install
#   Run all:  pre-commit run --all-files
repos:
  - repo: local
    hooks:
      - id: no-exception-exposure
        name: No exception detail in API responses (CWE-209)
        entry: python3 scripts/check_exception_exposure.py
        language: system
        pass_filenames: true
        files: 'services/api/apps/.*views\.py$'
