site_name: NetPulse Documentation
site_description: Push-first network intelligence platform
site_url: https://netpulse.readthedocs.io
repo_url: https://github.com/travisjohnsonga/netpulse
repo_name: travisjohnsonga/netpulse

theme:
  name: material
  palette:
    scheme: slate
    primary: blue
    accent: cyan

nav:
  - Home: index.md
  - Architecture: ARCHITECTURE.md
  - Setup:
    - Deployment: setup/deployment.md
    - NAT Configuration: setup/nat.md
  - Agent:
    - Overview: agents/overview.md
    - Installation: agents/installation.md
    - Configuration: agents/configuration.md
    - Security: agents/security.md
  - Platforms:
    - SonicWall: platforms/sonicwall.md
    - AOS-CX: platforms/aos_cx.md
    - FortiOS: platforms/fortios.md
  - Compliance:
    - Overview: compliance/overview.md
    - Interface & Role Rules: compliance/interface-rules.md
  - Reports: reports.md
  - Metrics & Alerting: metrics-and-alerting.md
  - Custom Alerts & InfluxDB Metrics: custom-alerts.md
  - Config Push Templates: config-push-templates.md
  - Flow Collection: flow-collection.md
  - Integrations:
    - ChatOps: integrations/chatops.md
    - UniFi: integrations/unifi.md
    - Wireless Monitoring: integrations/wireless.md
    - NetBox: integrations/netbox.md
    - Email / SMTP: integrations/email.md
  - Testing: TESTING_PLAN.md

markdown_extensions:
  - tables
  - fenced_code
  - admonition
  - toc:
      permalink: true

docs_dir: docs
