name: netpulse

services:

  # ─────────────────────────────────────────────────────────────────────────────
  # Infrastructure
  # ─────────────────────────────────────────────────────────────────────────────

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - netpulse-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  influxdb:
    image: influxdb:2.7
    restart: unless-stopped
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_ADMIN_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_ADMIN_TOKEN}
    volumes:
      - influxdb-data:/var/lib/influxdb2
    networks:
      - netpulse-net
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  opensearch:
    image: opensearchproject/opensearch:2.17.0
    ports:
      - "9200:9200"
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_PASSWORD}
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - DISABLE_SECURITY_PLUGIN=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    networks:
      - netpulse-net
    healthcheck:
      # Accepts yellow (single-node normal) and green; rejects red and connectivity failures.
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qv '\"status\":\"red\"'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  valkey:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    command: >-
      valkey-server
      --requirepass ${VALKEY_PASSWORD}
      --appendonly yes
      --save 60 1
    volumes:
      - valkey-data:/data
    networks:
      - netpulse-net
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli --no-auth-warning -a ${VALKEY_PASSWORD} ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10-alpine
    restart: unless-stopped
    command: ["-c", "/etc/nats/nats.conf"]
    environment:
      NATS_USER: ${NATS_USER}
      NATS_PASSWORD: ${NATS_PASSWORD}
    volumes:
      - nats-data:/data
      - ./nats/nats.conf:/etc/nats/nats.conf
    networks:
      - netpulse-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/varz > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot: make the openbao-data volume writable by both OpenBao (uid 100)
  # and the api/config-manager (gid 1000). Docker creates named volumes
  # root-owned, which would block OpenBao's file storage and the api's
  # .init_keys write. Runs once and exits before openbao starts.
  #
  # Also re-chmods .init_keys to 0640: after `chown -R 100:1000` the file is
  # owned by OpenBao (uid 100) but grouped to netpulse (gid 1000); without the
  # group read bit the gid-1000 api/config-manager get EACCES and auto-unseal +
  # the vault token fallback silently fail. Runs as root here, so it can fix a
  # file the gid-1000 services cannot chmod themselves. Guarded for first run.
  openbao-init:
    image: alpine:3.20
    command: sh -c "mkdir -p /openbao/data && chown -R 100:1000 /openbao/data && chmod 0775 /openbao/data && { [ -f /openbao/data/.init_keys ] && chmod 0640 /openbao/data/.init_keys || true; }"
    volumes:
      - openbao-data:/openbao/data
    networks:
      - netpulse-net

  openbao:
    image: openbao/openbao:2.1
    restart: unless-stopped
    # IPC_LOCK is required when disable_mlock = false in openbao.hcl.
    # It prevents OpenBao from swapping secret memory pages to disk.
    cap_add:
      - IPC_LOCK
    depends_on:
      openbao-init:
        condition: service_completed_successfully
    # Persistent file storage (not -dev). The image's entrypoint runs
    # `bao server -config=/openbao/config`, auto-loading our mounted
    # openbao.hcl. Initialised + auto-unsealed by the api service's
    # init_openbao command; keys persist on the openbao-data volume so secrets
    # survive restarts.
    command: server
    environment:
      OPENBAO_ADDR: http://0.0.0.0:8200
    volumes:
      - openbao-data:/openbao/data
      - ./openbao/config:/openbao/config
    networks:
      - netpulse-net
    healthcheck:
      # sealedcode/uninitcode=200 → "running but sealed/uninitialised" counts as
      # healthy so dependents can start and the api can auto-unseal it.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8200/v1/sys/health?sealedcode=200&uninitcode=200"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─────────────────────────────────────────────────────────────────────────────
  # Application Layer
  # ─────────────────────────────────────────────────────────────────────────────

  api:
    build:
      context: ./services/api
      # Version baked into the image; netpulse.sh exports these on rebuild.
      args:
        GIT_COMMIT: ${GIT_COMMIT:-}
        GIT_COUNT: ${GIT_COUNT:-}
        BUILT_AT: ${BUILT_AT:-}
    restart: unless-stopped
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.development}
      SSL_DIR: /app/ssl
      # Only the api service seeds the initial superuser (idempotent) and
      # initialises/unseals OpenBao. Other api-image services share the
      # entrypoint but must not.
      SEED_SUPERUSER: "1"
      INIT_OPENBAO: "1"
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      # NetPulse's own HTTPS cert/key — the API generates them here; nginx
      # (frontend) reads them from the same volume to serve TLS.
      - ssl-certs:/app/ssl
      # OpenBao keys file (.init_keys) — api initialises/unseals and reads the
      # root token from here when OPENBAO_TOKEN is unset.
      - openbao-data:/openbao/data
      # Community advisory YAML (Juniper/Arista/…) for load_community_advisories.
      - ./advisories:/app/advisories:ro
      # SNMP MIB tree — read-write so MIB uploads can be saved into mibs/custom/.
      - ./mibs:/app/mibs
    # Service-check "Run now" executes the probe in this process, so the api
    # needs the same unprivileged-ICMP sysctl as check-engine for ICMP checks.
    sysctls:
      - net.ipv4.ping_group_range=0 2147483647
    # Device discovery (run_discovery) runs nmap/ping in the api process; raw
    # sockets let nmap do faster SYN/ICMP scanning (it degrades to unprivileged
    # TCP-connect scanning without them).
    cap_add:
      - NET_RAW
      - NET_ADMIN
    networks:
      - netpulse-net
    depends_on:
      postgres:
        condition: service_healthy
      influxdb:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      valkey:
        condition: service_healthy
      nats:
        condition: service_healthy
      openbao:
        condition: service_healthy
    healthcheck:
      # GET /api/health/ → 200. Uses Python (curl/wget aren't in the slim image).
      test: ["CMD", "python", "-c", "import urllib.request,sys; r=urllib.request.urlopen('http://localhost:8000/api/health/'); sys.exit(0 if r.status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  websocket:
    build: ./services/api
    restart: unless-stopped
    command: daphne -b 0.0.0.0 -p 8001 config.asgi:application
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.development}
    ports:
      - "${WS_PORT:-8001}:8001"
    networks:
      - netpulse-net
    depends_on:
      valkey:
        condition: service_healthy
      nats:
        condition: service_healthy
      api:
        condition: service_started

  # ─────────────────────────────────────────────────────────────────────────────
  # Frontend
  # ─────────────────────────────────────────────────────────────────────────────

  frontend:
    build: ./services/frontend
    restart: unless-stopped
    environment:
      REACT_APP_API_URL: ${REACT_APP_API_URL}
      REACT_APP_WS_URL: ${REACT_APP_WS_URL}
    ports:
      - "${FRONTEND_PORT:-3000}:80"
      - "${FRONTEND_HTTPS_PORT:-3443}:443"
    volumes:
      # Read NetPulse's HTTPS cert/key (generated by the API) to serve TLS.
      # An entrypoint bootstraps a temporary self-signed cert if none exists
      # yet, so nginx always starts.
      - ssl-certs:/etc/nginx/ssl
    networks:
      - netpulse-net
    depends_on:
      api:
        condition: service_started

  # ─────────────────────────────────────────────────────────────────────────────
  # Ingest Layer — all publish to NATS; only NATS health is required at startup
  # ─────────────────────────────────────────────────────────────────────────────

  ingest-grpc:
    build: ./services/ingest-grpc
    restart: unless-stopped
    command: python -m ingest.grpc_server
    env_file: .env
    ports:
      - "${GRPC_PORT:-57400}:57400"
    networks:
      - netpulse-net
    depends_on:
      nats:
        condition: service_healthy
      valkey:
        condition: service_healthy

  ingest-snmp:
    build: ./services/ingest-snmp
    restart: unless-stopped
    command: python -m ingest.snmp_server
    env_file: .env
    ports:
      # Port 162 is privileged on Linux; map to an unprivileged host port in
      # docker-compose.override.yml if binding 162 fails on your host.
      - "${SNMP_TRAP_PORT:-162}:162/udp"
    volumes:
      # Read the OpenBao root token from the shared keys file (OPENBAO_TOKEN is
      # blank by default) so SNMPv3/v2c device credentials can be fetched.
      - openbao-data:/openbao/data:ro
      # SNMP MIB tree (read-only) for OID resolution.
      - ./mibs:/app/mibs:ro
    networks:
      - netpulse-net
    depends_on:
      nats:
        condition: service_healthy
      valkey:
        condition: service_healthy

  ingest-syslog:
    build: ./services/ingest-syslog
    restart: unless-stopped
    command: python -m ingest.syslog_server
    env_file: .env
    ports:
      - "${SYSLOG_UDP_PORT:-514}:514/udp"
      - "${SYSLOG_TCP_PORT:-601}:601/tcp"
    networks:
      - netpulse-net
    depends_on:
      nats:
        condition: service_healthy

  ingest-flow:
    build: ./services/ingest-flow
    restart: unless-stopped
    command: python -m ingest.flow_server
    env_file: .env
    ports:
      - "${NETFLOW_PORT:-2055}:2055/udp"
      - "${SFLOW_PORT:-6343}:6343/udp"
    networks:
      - netpulse-net
    depends_on:
      nats:
        condition: service_healthy

  ingest-otlp:
    build: ./services/ingest-otlp
    restart: unless-stopped
    command: python -m ingest.otlp_server
    env_file: .env
    ports:
      - "${OTLP_GRPC_PORT:-4317}:4317"
      - "${OTLP_HTTP_PORT:-4318}:4318"
    networks:
      - netpulse-net
    depends_on:
      nats:
        condition: service_healthy

  ingest-api-poller:
    build: ./services/ingest-api-poller
    restart: unless-stopped
    command: python -m ingest.poller_server
    env_file: .env
    ports:
      - "${API_POLLER_WEBHOOK_PORT:-8080}:8080"
    environment:
      INTEGRATIONS_JSON: ${INTEGRATIONS_JSON:-[]}
    networks:
      - netpulse-net
    depends_on:
      - nats
      - openbao

  # ─────────────────────────────────────────────────────────────────────────────
  # Processing & Intelligence Engines
  # Commands reference Django management commands to be implemented in ./backend.
  # ─────────────────────────────────────────────────────────────────────────────

  stream-processor:
    build: ./services/api
    restart: unless-stopped
    command: python manage.py run_stream_processor
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.development}
    networks:
      - netpulse-net
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      influxdb:
        condition: service_healthy
      opensearch:
        condition: service_healthy

  config-manager:
    build: ./services/api
    restart: unless-stopped
    command: python manage.py run_config_manager
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.development}
    volumes:
      # Read the OpenBao root token from the shared keys file (git creds).
      - openbao-data:/openbao/data:ro
      # Trust admin-added CA certs for outbound git-over-HTTPS (ca-bundle.crt).
      - ssl-certs:/app/ssl:ro
    networks:
      - netpulse-net
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      openbao:
        condition: service_healthy

  reachability-monitor:
    build: ./services/api
    restart: unless-stopped
    command: python manage.py run_reachability_monitor --interval 30
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.development}
    networks:
      - netpulse-net
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

  alert-engine:
    build: ./services/api
    restart: unless-stopped
    command: python manage.py run_alert_engine
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.development}
    networks:
      - netpulse-net
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      valkey:
        condition: service_healthy

  check-engine:
    build: ./services/api
    restart: unless-stopped
    command: python manage.py run_check_engine
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.development}
    # ICMP service checks. The container runs as non-root, so use unprivileged
    # datagram ICMP: ping_group_range lets any gid open ICMP sockets. NET_RAW/
    # NET_ADMIN are kept for the privileged-raw fallback (effective only if run
    # as root).
    sysctls:
      - net.ipv4.ping_group_range=0 2147483647
    cap_add:
      - NET_RAW
      - NET_ADMIN
    networks:
      - netpulse-net
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

  cve-engine:
    build: ./services/api
    restart: unless-stopped
    command: python manage.py run_cve_engine
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.development}
    volumes:
      # Trust admin-added CA certs for outbound CVE-feed HTTPS (ca-bundle.crt).
      - ssl-certs:/app/ssl:ro
      # Community advisory YAML (Juniper/Arista/…) for load_community_advisories.
      - ./advisories:/app/advisories:ro
    networks:
      - netpulse-net
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

  lifecycle-engine:
    build: ./services/api
    restart: unless-stopped
    command: python manage.py run_lifecycle_engine
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.development}
    volumes:
      # Trust admin-added CA certs for outbound EOL-feed HTTPS (ca-bundle.crt).
      - ssl-certs:/app/ssl:ro
    networks:
      - netpulse-net
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

  security-engine:
    build: ./services/api
    restart: unless-stopped
    command: python manage.py run_security_engine
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.development}
    networks:
      - netpulse-net
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      influxdb:
        condition: service_healthy

  scheduler:
    build: ./services/api
    restart: unless-stopped
    # Celery Beat for periodic tasks; requires django-celery-beat and a running
    # Celery worker (add a separate worker service when needed).
    command: celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.development}
    networks:
      - netpulse-net
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      nats:
        condition: service_healthy

# ─────────────────────────────────────────────────────────────────────────────
# Volumes
# ─────────────────────────────────────────────────────────────────────────────

volumes:
  postgres-data:
  influxdb-data:
  opensearch-data:
  valkey-data:
  nats-data:
  openbao-data:
  ssl-certs:

# ─────────────────────────────────────────────────────────────────────────────
# Networks
# ─────────────────────────────────────────────────────────────────────────────

networks:
  netpulse-net:
    driver: bridge
