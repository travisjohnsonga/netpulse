name: Build Agent

on:
  push:
    # Without `branches`, a `push` block that only sets `tags` fires on tag
    # pushes ONLY — main-branch pushes never built. List main explicitly so
    # agent changes merged to main rebuild the binaries (tags still build too).
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - 'agent/**'
      - '.github/workflows/build-agent.yml'
  pull_request:
    paths:
      - 'agent/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Opt the Node20 JS actions onto the Node 24 runtime to clear the
    # "deprecated Node.js 20 actions" warning ahead of the forced migration.
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v7
        # Full history + tags so build.sh's `git describe --tags` resolves the
        # version. The default shallow checkout (depth 1, no tags) made describe
        # fall back to a bare commit hash, so CI-built binaries reported e.g.
        # "525bb42" instead of "v1.3.0" — a real release reported a hash.
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-go@v6
        with:
          go-version: '1.22'
          # go.sum lives in agent/, not the repo root — point the dep cache at it.
          cache: true
          cache-dependency-path: agent/go.sum

      - name: Vet (Linux + Windows)
        working-directory: agent
        run: |
          go mod tidy
          go vet ./...
          GOOS=windows GOARCH=amd64 go vet ./...

      - name: Build all platforms
        working-directory: agent
        run: |
          chmod +x scripts/build.sh
          ./scripts/build.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agent-binaries
          path: agent/dist/

  release:
    # Publish the built binaries as GitHub Release assets so download_views.py
    # can redirect to a public, auth-free URL when local dist/ binaries are
    # absent. ONLY on tag pushes (a real release): the rolling `agent-latest`
    # must track tagged releases, not every main commit — otherwise a routine
    # main merge overwrites agent-latest with a `vX.Y.Z-N-gSHA` dev build and the
    # update scripts (which pull agent-latest) would roll hosts to a dev commit.
    # (main still BUILDS via the build job above; it just doesn't publish.)
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      # Releases require write access to repo contents.
      contents: write
    steps:
      - name: Download built binaries
        uses: actions/download-artifact@v4
        with:
          name: agent-binaries
          path: agent/dist

      - name: Create/update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: agent-latest
          name: NetPulse Agent (latest)
          files: |
            agent/dist/netpulse-agent-linux-amd64
            agent/dist/netpulse-agent-linux-arm64
            agent/dist/netpulse-agent-windows-amd64.exe
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
