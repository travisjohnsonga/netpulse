name: Security checks

# Security guards for the backend, run without the full stack:
#  - exception-exposure: dependency-free AST guard (also in the pytest suite
#    tests/test_security.py::TestNoExceptionExposure and the pre-commit hook).
#  - python-security-scan: pip-audit (dependency CVEs, BLOCKING) + bandit (static
#    security lint, BLOCKING at medium+ severity — every High/Medium finding is
#    fixed or carries an inline justified `# nosec`).

on:
  push:
    branches: [main]
    paths:
      - 'services/api/**'
      - 'scripts/check_exception_exposure.py'
      - '.github/workflows/security-checks.yml'
  pull_request:
    paths:
      - 'services/api/**'
      - 'scripts/check_exception_exposure.py'
      - '.github/workflows/security-checks.yml'

permissions:
  contents: read

jobs:
  exception-exposure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: No exception detail in API responses (CWE-209)
        run: python3 scripts/check_exception_exposure.py

  python-security-scan:
    # Dependency CVE audit + static security linting for the Django backend.
    # Tool versions are pinned so a tool-side change can't silently alter the gate.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install scanners (pinned)
        run: python -m pip install --upgrade "pip-audit==2.9.0" "bandit==1.8.6"

      # BLOCKING: services/api/requirements.txt is currently free of known CVEs
      # (verified locally when this job was added). A newly-disclosed CVE in a
      # pinned dependency fails the build so it gets triaged, not ignored.
      - name: pip-audit (services/api dependencies)
        run: pip-audit -r services/api/requirements.txt --progress-spinner off

      # BLOCKING at medium+ severity. Every High/Medium finding in
      # services/api/apps has been triaged: each is either fixed or carries an
      # inline `# nosec <id> — <justification>` (B310 urlopen guarded by
      # net_safety.validate_outbound_url; B501 verify=False on internal-only
      # OpenSearch; B601 paramiko exec_command with a constant command).
      # The grandfathering baseline is removed, so the suppressions are explicit
      # in code, not hidden in a file, and any NEW medium+ finding fails the build.
      #
      # --skip B507 (paramiko AutoAddPolicy): deliberately delegated to CodeQL's
      # py/paramiko-missing-host-key-validation, which tracks every instance and
      # where the two device-automation instances (compliance + arp_mac
      # collectors) are reviewed/dismissed as accepted. Skipping it in bandit
      # avoids duplicate coverage AND the bandit↔CodeQL conflict where adding an
      # inline `# nosec` would edit the flagged line and re-open the dismissed
      # CodeQL alert.
      #
      # Low-severity findings (try/except/pass best-effort handlers, "password"-
      # substring string constants that are field names not secrets, parameterized
      # shell-free subprocess) are surfaced by a full `bandit -r services/api/apps`
      # scan but excluded from the gate by the severity threshold as
      # low-risk / false-positive-heavy.
      - name: bandit (services/api/apps, blocking, medium+)
        run: bandit -r services/api/apps --severity-level medium --skip B507
