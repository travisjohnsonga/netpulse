name: Security checks

# Security guards for the backend, run without the full stack:
#  - exception-exposure: dependency-free AST guard (also in the pytest suite
#    tests/test_security.py::TestNoExceptionExposure and the pre-commit hook).
#  - python-security-scan: pip-audit (dependency CVEs, BLOCKING) + bandit (static
#    security lint, REPORT-ONLY against a committed baseline).

on:
  push:
    branches: [main]
    paths:
      - 'services/api/**'
      - 'scripts/check_exception_exposure.py'
      - '.bandit-baseline.json'
      - '.github/workflows/security-checks.yml'
  pull_request:
    paths:
      - 'services/api/**'
      - 'scripts/check_exception_exposure.py'
      - '.bandit-baseline.json'
      - '.github/workflows/security-checks.yml'

permissions:
  contents: read

jobs:
  exception-exposure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: No exception detail in API responses (CWE-209)
        run: python3 scripts/check_exception_exposure.py

  python-security-scan:
    # Dependency CVE audit + static security linting for the Django backend.
    # Tool versions are pinned so a tool-side change can't silently alter the gate.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install scanners (pinned)
        run: python -m pip install --upgrade "pip-audit==2.9.0" "bandit==1.8.6"

      # BLOCKING: services/api/requirements.txt is currently free of known CVEs
      # (verified locally when this job was added). A newly-disclosed CVE in a
      # pinned dependency fails the build so it gets triaged, not ignored.
      - name: pip-audit (services/api dependencies)
        run: pip-audit -r services/api/requirements.txt --progress-spinner off

      # REPORT-ONLY: services/api/apps currently has bandit findings (6 High /
      # 5 Medium / 51 Low when this job was added — predominantly verify=False in
      # the internal run_health_checks probe, the SSRF-guarded NetBox urlopen,
      # and cert-parse try/except). They are grandfathered by .bandit-baseline.json,
      # so this step passes today and surfaces only NEW findings; continue-on-error
      # keeps it non-blocking until the baseline is triaged (then drop
      # continue-on-error to make it a hard ratchet on regressions).
      - name: bandit (services/api/apps, baselined, report-only)
        continue-on-error: true
        run: bandit -r services/api/apps -b .bandit-baseline.json
