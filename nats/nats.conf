# NetPulse NATS Server Configuration
# NATS_USER and NATS_PASSWORD are injected via container environment (env_file: .env).

port: 4222

# Monitoring endpoint — internal only, used by the Docker health check.
http_port: 8222

jetstream {
  store_dir: "/data"
  max_memory_store: 1GB
  max_file_store: 10GB
}

authorization {
  user:     $NATS_USER
  password: $NATS_PASSWORD
}
